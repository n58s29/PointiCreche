<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PointiCrèche v4 — Conformité PSU 2025</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=Fraunces:ital,wght@0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#FAF7F2;--card:#FFF;--warm:#FFF8F0;--text:#2C1810;--muted:#8B7355;--light:#B8A48E;--accent:#E8734A;--accent2:#D4612F;--accent-s:#FDEEE8;--ok:#388E3C;--ok-s:#E8F5E9;--warn:#EF6C00;--warn-s:#FFF3E0;--bad:#C62828;--bad-s:#FFEBEE;--info:#5C6BC0;--info-s:#E8EAF6;--purple:#7B1FA2;--purple-s:#F3E5F6;--border:#E8DFD3;--sh:0 2px 12px rgba(44,24,16,.06);--r:14px;--rs:8px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
.hdr{background:linear-gradient(135deg,#2C1810,#4A2E20 60%,#6B3D2E);color:#fff;padding:18px 28px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(44,24,16,.2)}
.hdr-in{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr h1{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700}.hdr h1 b{color:var(--accent)}
.hdr-sub{font-size:.72rem;opacity:.5;margin-top:1px}
.hdr-btns{display:flex;gap:6px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:var(--rs);font-family:'DM Sans';font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{background:var(--accent2);transform:translateY(-1px)}
.btn-s{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.2)}.btn-s:hover{background:rgba(255,255,255,.2)}
.btn-o{background:0;color:var(--accent);border:2px solid var(--accent)}.btn-o:hover{background:var(--accent-s)}
.btn-sm{padding:4px 10px;font-size:.74rem}
.main{max-width:1400px;margin:0 auto;padding:20px 28px 50px}
.tabs{display:flex;gap:2px;background:var(--card);border-radius:var(--r);padding:3px;margin-bottom:20px;box-shadow:var(--sh);border:1px solid var(--border);overflow-x:auto}
.tab{padding:9px 16px;border-radius:10px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;background:0;color:var(--muted);transition:all .2s;white-space:nowrap;font-family:'DM Sans'}
.tab:hover{color:var(--text);background:var(--bg)}.tab.on{background:var(--accent);color:#fff}
.card{background:var(--card);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh);padding:20px;margin-bottom:14px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.card-t{font-family:'Fraunces',serif;font-size:1rem;font-weight:700}
.upload{border:2px dashed var(--border);border-radius:var(--r);padding:28px 16px;text-align:center;cursor:pointer;transition:all .3s;background:var(--warm)}
.upload:hover,.upload.drag{border-color:var(--accent);background:var(--accent-s)}
.upload .ico{font-size:2rem;margin-bottom:4px}
.upload h3{font-family:'Fraunces',serif;font-size:.95rem;margin-bottom:2px}
.upload p{color:var(--muted);font-size:.76rem}
.cfg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.cfg label{display:block;font-size:.7rem;font-weight:600;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.cfg input,.cfg select{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:var(--rs);font-family:'DM Sans';font-size:.84rem;background:var(--bg);color:var(--text)}
.cfg input:focus,.cfg select:focus{outline:none;border-color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.st{background:var(--card);border-radius:var(--r);border:1px solid var(--border);padding:14px;text-align:center;box-shadow:var(--sh)}
.st:hover{transform:translateY(-1px);transition:.2s}
.st-v{font-family:'Fraunces',serif;font-size:1.7rem;font-weight:800;line-height:1.1}
.st-l{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px;font-weight:600}
.tc{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem}
thead th{text-align:left;padding:8px 10px;font-size:.68rem;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);border-bottom:2px solid var(--border);white-space:nowrap;cursor:pointer}
tbody td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tbody tr:hover{background:var(--warm)}
.badge{display:inline-flex;align-items:center;gap:2px;padding:2px 7px;border-radius:20px;font-size:.68rem;font-weight:600}
.b-bad{background:var(--bad-s);color:var(--bad)}.b-warn{background:var(--warn-s);color:var(--warn)}.b-ok{background:var(--ok-s);color:var(--ok)}.b-info{background:var(--info-s);color:var(--info)}
.gauge{position:relative;width:100%;height:24px;background:#eee;border-radius:5px;overflow:hidden}
.gauge-f{height:100%;border-radius:5px;transition:width .5s}
.gauge-t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:700;color:var(--text);mix-blend-mode:multiply}
.pnl{display:none}.pnl.on{display:block;animation:fi .25s}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}@media(max-width:900px){.two{grid-template-columns:1fr}}
.hero{border-radius:var(--r);padding:18px;margin-bottom:14px;text-align:center}
.hero-v{font-family:'Fraunces',serif;font-size:2.6rem;font-weight:800}
.dg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px}
.dg label{display:block;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;font-weight:600}
.dg span{font-size:.86rem;font-weight:600}
.empty{text-align:center;padding:35px 18px;color:var(--muted)}
.empty .ico{font-size:2.8rem;opacity:.4;margin-bottom:8px}
.empty h3{font-family:'Fraunces',serif;font-size:.95rem;color:var(--text);margin-bottom:2px}
.tip{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:var(--border);color:var(--muted);font-size:.62rem;font-weight:700;cursor:help;position:relative}
.tip:hover::after{content:attr(data-t);position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:5px 9px;border-radius:5px;font-size:.7rem;font-weight:400;white-space:normal;z-index:10;max-width:300px;min-width:180px;text-align:left}
.note{padding:14px;border-radius:var(--r);font-size:.82rem;margin-bottom:14px}
.note-info{background:var(--info-s);border:1px solid #9FA8DA;color:var(--info)}
.note-warn{background:var(--warn-s);border:1px solid #FFB74D;color:var(--warn)}
.note-bad{background:var(--bad-s);border:1px solid #EF9A9A;color:var(--bad)}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@media(max-width:768px){.hdr{padding:10px 12px}.hdr h1{font-size:1.1rem}.main{padding:10px 12px 30px}.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="hdr"><div class="hdr-in">
  <div><h1>🏠 Pointi<b>Crèche</b> <small style="font-size:.45em;opacity:.35">v4 · PSU 2025</small></h1>
  <div class="hdr-sub">Taux de facturation · Conformité pointage · Impact PSU linéarisé</div></div>
  <div class="hdr-btns">
    <button class="btn btn-s" onclick="loadDemo()">🎲 Démo</button>
    <button class="btn btn-p" onclick="$('fPt').click()">📂 Pointeuse</button>
    <button class="btn btn-s" onclick="$('fCt').click()">📜 Contrats</button>
    <input type="file" id="fPt" accept=".csv,.txt" style="display:none" onchange="hF(event,'p')">
    <input type="file" id="fCt" accept=".csv,.txt" style="display:none" onchange="hF(event,'c')">
  </div>
</div></header>

<main class="main">
<div class="tabs">
  <button class="tab on" data-t="config" onclick="go('config')">⚙️ Config structure</button>
  <button class="tab" data-t="import" onclick="go('import')">📥 Import</button>
  <button class="tab" data-t="ecarts" onclick="go('ecarts')">📊 Écarts & PSU</button>
  <button class="tab" data-t="pointage" onclick="go('pointage')">🔴 Absences pointage</button>
  <button class="tab" data-t="detail" onclick="go('detail')">👶 Détail famille</button>
</div>
<div id="p-config" class="pnl on"></div>
<div id="p-import" class="pnl"></div>
<div id="p-ecarts" class="pnl"></div>
<div id="p-pointage" class="pnl"></div>
<div id="p-detail" class="pnl"></div>
</main>

<script>
const $=id=>document.getElementById(id);
let scans=[],families={},results=null;

// ===== STRUCTURE CONFIG (saved in localStorage-like object) =====
let STRUCT={
  nom:'Ma crèche',
  places:30,
  couches_repas:true,
  charges_annuelles:588500,
  participations_annuelles:113313,
  taux_rg:97,
  nb_inscrits:65,
  journees_pedagogiques:3,
  tolerance:10,
  // CSV parsing
  sep:';',colD:0,colH:1,colN:2,colS:3,dfmt:'dd/mm/yyyy'
};

function go(id){
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on'));
  $('p-'+id).classList.add('on');
  document.querySelector(`.tab[data-t="${id}"]`)?.classList.add('on');
}

// ===== CONFIG TAB =====
function renderConfig(){
  $('p-config').innerHTML=`
  <div class="note note-info"><strong>ℹ️ Paramétrez votre structure ici.</strong> Ces données servent au calcul du taux de facturation et de l'estimation PSU 2025 (barème linéarisé depuis le 01/01/2025).</div>
  <div class="two">
    <div class="card">
      <div class="card-h"><div class="card-t">🏠 Identité structure</div></div>
      <div class="cfg">
        <div><label>Nom de la structure</label><input value="${STRUCT.nom}" onchange="STRUCT.nom=this.value;rerun()"></div>
        <div><label>Nb places (arrêté PMI)</label><input type="number" value="${STRUCT.places}" min="1" onchange="STRUCT.places=+this.value;rerun()"></div>
        <div><label>Fourniture couches & repas</label><select onchange="STRUCT.couches_repas=this.value==='1';rerun()">
          <option value="1" ${STRUCT.couches_repas?'selected':''}>Oui — couches ET repas</option>
          <option value="0" ${!STRUCT.couches_repas?'selected':''}>Non</option></select></div>
        <div><label>Nb enfants inscrits (année)</label><input type="number" value="${STRUCT.nb_inscrits}" min="1" onchange="STRUCT.nb_inscrits=+this.value;rerun()"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><div class="card-t">💰 Données financières annuelles</div>
        <span class="tip" data-t="Ces données permettent de calculer le prix de revient et le montant PSU estimé. Utilisez vos données prévisionnelles ou réelles.">?</span></div>
      <div class="cfg">
        <div><label>Total charges fonctionnement (€)</label><input type="number" value="${STRUCT.charges_annuelles}" onchange="STRUCT.charges_annuelles=+this.value;rerun()"></div>
        <div><label>Participations familiales (€)</label><input type="number" value="${STRUCT.participations_annuelles}" onchange="STRUCT.participations_annuelles=+this.value;rerun()"></div>
        <div><label>Taux régime général (%)</label><input type="number" value="${STRUCT.taux_rg}" min="0" max="100" onchange="STRUCT.taux_rg=+this.value;rerun()"></div>
        <div><label>Journées pédagogiques (/an, max 3)</label><input type="number" value="${STRUCT.journees_pedagogiques}" min="0" max="3" onchange="STRUCT.journees_pedagogiques=+this.value;rerun()"></div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-h"><div class="card-t">📋 Format CSV pointeuse</div></div>
    <div class="cfg">
      <div><label>Séparateur</label><select onchange="STRUCT.sep=this.value==='\\\\t'?'\\t':this.value"><option value=";" ${STRUCT.sep===';'?'selected':''}>;</option><option value=",">,</option></select></div>
      <div><label>Format date</label><select onchange="STRUCT.dfmt=this.value"><option value="dd/mm/yyyy">JJ/MM/AAAA</option><option value="yyyy-mm-dd">AAAA-MM-JJ</option></select></div>
      <div><label>Tolérance pointage (min)</label><input type="number" value="${STRUCT.tolerance}" min="0" max="30" onchange="STRUCT.tolerance=+this.value;rerun()"></div>
    </div>
  </div>
  <div class="card" style="background:var(--warm)">
    <div class="card-h"><div class="card-t">📐 Barème PSU 2025 applicable</div></div>
    <div class="dg">
      <div><label>Type</label><span>${STRUCT.couches_repas?'Couches + repas':'Sans couches/repas'}</span></div>
      <div><label>Prix plafond ≤107%</label><span>${STRUCT.couches_repas?'10,05':'9,72'} €/h réalisée</span></div>
      <div><label>Formule 107-120%</label><span>${STRUCT.couches_repas?'21,96':'21,63'} − 11,13 × Tx fact.</span></div>
      <div><label>Prix plafond ≥120%</label><span>${STRUCT.couches_repas?'8,60':'8,27'} €/h réalisée</span></div>
      <div><label>Taux prestation</label><span>66%</span></div>
      <div><label>Taux RG</label><span>${STRUCT.taux_rg}%</span></div>
    </div>
  </div>`;
}

function rerun(){renderConfig();if(scans.length)analyze();}

// ===== IMPORT =====
function renderImport(){
  $('p-import').innerHTML=`
  <div class="two">
    <div class="card"><div class="card-h"><div class="card-t">📂 Pointeuse</div></div>
      <div class="upload" onclick="$('fPt').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="dD(event,'p')">
        <div class="ico">📋</div><h3>CSV pointeuse</h3><p>Date;Heure;Enfant;Sens</p></div><div id="stP" style="margin-top:6px"></div></div>
    <div class="card"><div class="card-h"><div class="card-t">📜 Contrats</div></div>
      <div class="upload" onclick="$('fCt').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="dD(event,'c')">
        <div class="ico">📄</div><h3>CSV contrats</h3><p>Enfant;Jours;Arr;Dep;Taux;Type</p></div><div id="stC" style="margin-top:6px"></div></div>
  </div>
  <div class="card" id="cTbl" style="display:none"><div class="card-h"><div class="card-t">📜 Contrats chargés</div><span class="badge b-info" id="cCn"></span></div>
    <div class="tc"><table><thead><tr><th>Enfant</th><th>Jours</th><th>Arr.</th><th>Dép.</th><th>H/jour</th><th>Taux</th></tr></thead><tbody id="cTb"></tbody></table></div></div>`;
}

// ===== FILE HANDLING =====
function dD(e,t){e.preventDefault();e.target.closest('.upload')?.classList.remove('drag');rF(e.dataTransfer.files[0],t)}
function hF(e,t){rF(e.target.files[0],t)}
function rF(f,t){if(!f)return;const r=new FileReader();r.onload=e=>{t==='c'?parseCt(e.target.result):parsePt(e.target.result)};r.readAsText(f,'UTF-8')}

function parsePt(txt){
  const s=STRUCT.sep,lines=txt.split('\n').map(l=>l.trim().replace(/\r/g,'')).filter(l=>l);
  const i0=/\d/.test(lines[0].split(s)[STRUCT.colD]?.charAt(0))?0:1;
  scans=[];let err=0;
  for(let i=i0;i<lines.length;i++){
    const c=lines[i].split(s).map(x=>x.trim().replace(/"/g,''));if(c.length<4){err++;continue}
    const dt=pD(c[STRUCT.colD]),tp=c[STRUCT.colH].match(/(\d{1,2})[h:.](\d{2})/);if(!dt||!tp){err++;continue}
    const tm=+tp[1]*60+(+tp[2]),sens=c[STRUCT.colS]?.toUpperCase();
    scans.push({date:dt,dk:dt.toISOString().split('T')[0],heure:c[STRUCT.colH],tm,nom:c[STRUCT.colN],
      sens:'AEI'.includes(sens?.charAt(0))||['IN','ENTREE','ARRIVÉE','ARRIVEE'].includes(sens)?'A':'D'});
  }
  scans.sort((a,b)=>a.date-b.date||a.tm-b.tm);
  [...new Set(scans.map(r=>r.nom))].forEach(n=>{if(!families[n])families[n]={arr:8*60,dep:17*60+30,taux:3,jours:[0,1,2,3,4],type:'Défaut'}});
  $('stP').innerHTML=`<span class="badge b-ok">✅ ${scans.length} scans</span> ${err?`<span class="badge b-warn">⚠️ ${err} ignorées</span>`:''} <span class="badge b-info">👶 ${new Set(scans.map(r=>r.nom)).size} enfants</span>`;
  analyze();
}
function parseCt(txt){
  const s=STRUCT.sep,lines=txt.split('\n').map(l=>l.trim().replace(/\r/g,'')).filter(l=>l);
  const i0=lines[0].toLowerCase().includes('enfant')?1:0;
  const jm={'lundi':0,'mardi':1,'mercredi':2,'jeudi':3,'vendredi':4,'lun':0,'mar':1,'mer':2,'jeu':3,'ven':4};
  let n=0;
  for(let i=i0;i<lines.length;i++){
    const c=lines[i].split(s).map(x=>x.trim().replace(/"/g,''));if(c.length<5)continue;
    const js=c[1].toLowerCase(),jours=[];for(const[k,v]of Object.entries(jm))if(js.includes(k))jours.push(v);jours.sort();
    const tx=parseFloat(c[4].replace(',','.'));
    families[c[0]]={arr:t2m(c[2]),dep:t2m(c[3]),taux:isNaN(tx)?3:tx,jours:jours.length?jours:[0,1,2,3,4],type:c[5]||''};n++;
  }
  $('stC').innerHTML=`<span class="badge b-ok">✅ ${n} contrats</span>`;showCt();if(scans.length)analyze();
}
function showCt(){
  $('cTbl').style.display='block';$('cCn').textContent=Object.keys(families).length+' familles';
  const jl={0:'L',1:'Ma',2:'Me',3:'J',4:'V'};
  $('cTb').innerHTML=Object.entries(families).sort((a,b)=>a[0].localeCompare(b[0])).map(([n,f])=>`<tr><td><strong>${n}</strong></td><td>${f.jours.map(j=>jl[j]).join(' ')}</td><td>${m2t(f.arr)}</td><td>${m2t(f.dep)}</td><td>${Math.round((f.dep-f.arr)/60*10)/10}h</td><td>${f.taux.toFixed(2)}€</td></tr>`).join('');
}

// ===== HELPERS =====
function pD(s){const p=s.split(/[\/\-\.]/);if(p.length!==3)return null;let d,m,y;if(STRUCT.dfmt==='dd/mm/yyyy'){d=+p[0];m=+p[1]-1;y=+p[2]}else{y=+p[0];m=+p[1]-1;d=+p[2]}if(y<100)y+=2000;const dt=new Date(y,m,d);return isNaN(dt)?null:dt}
function m2t(m){return`${String(Math.floor(m/60)).padStart(2,'0')}:${String(Math.abs(m%60)).padStart(2,'0')}`}
function t2m(s){const p=s.match(/(\d{1,2})[h:.](\d{2})/);return p?(+p[1]*60+(+p[2])):0}
function gc(p){return p>=98?'var(--ok)':p>=90?'#8BC34A':p>=80?'var(--warn)':'var(--bad)'}

// ===== PSU 2025 CALCULATION =====
function calcPSU(hFacturees, hRealisees){
  const txFact = hRealisees>0 ? (hFacturees/hRealisees*100) : 100;
  const CR = STRUCT.couches_repas;
  // Prix plafond barème 2025
  let prixPlafond;
  if(txFact<=107) prixPlafond = CR ? 10.05 : 9.72;
  else if(txFact>=120) prixPlafond = CR ? 8.60 : 8.27;
  else prixPlafond = (CR ? 21.96 : 21.63) - 11.13 * (txFact/100);
  // Prix de revient
  const prixRevient = hRealisees>0 ? STRUCT.charges_annuelles / hRealisees : 0;
  // Prix retenu = min(revient, plafond)
  const prixRetenu = Math.min(prixRevient, prixPlafond);
  // PSU unitaire = 66% du prix retenu
  const psuUnitaire = prixRetenu * 0.66;
  // PF par heure facturée
  const pfParH = hFacturees>0 ? STRUCT.participations_annuelles / hFacturees : 0;
  // PSU calculée = (psuUnitaire - pfParH) × hFacturees × taux_RG
  const psu = (psuUnitaire - pfParH) * hFacturees * (STRUCT.taux_rg/100);
  // Journées pédagogiques
  const jpFinancement = STRUCT.journees_pedagogiques * 10 * STRUCT.places * psuUnitaire * (STRUCT.taux_rg/100);
  // Heures préparation accueil
  const hpFinancement = STRUCT.nb_inscrits * 6 * psuUnitaire * (STRUCT.taux_rg/100);

  return {txFact:Math.round(txFact*100)/100, prixPlafond:Math.round(prixPlafond*100)/100,
    prixRevient:Math.round(prixRevient*100)/100, prixRetenu:Math.round(prixRetenu*100)/100,
    psuUnitaire:Math.round(psuUnitaire*100)/100, psu:Math.round(psu*100)/100,
    jpFinancement:Math.round(jpFinancement*100)/100, hpFinancement:Math.round(hpFinancement*100)/100};
}

// ===== ANALYSIS =====
function analyze(){
  const tol=STRUCT.tolerance;
  const grp={};scans.forEach(s=>{if(!grp[s.nom])grp[s.nom]={};if(!grp[s.nom][s.dk])grp[s.nom][s.dk]=[];grp[s.nom][s.dk].push(s)});
  const allDates=[...new Set(scans.map(s=>s.dk))].sort();
  const names=[...new Set(scans.map(s=>s.nom))];
  results={};
  let globalHTheo=0, globalHReel=0;

  names.forEach(nom=>{
    const f=families[nom]||{arr:8*60,dep:17*60+30,taux:3,jours:[0,1,2,3,4]};
    const days=grp[nom]||{};
    const hCJ=(f.dep-f.arr)/60;
    const expected=allDates.filter(dk=>{const wd=(new Date(dk).getDay()+6)%7;return f.jours.includes(wd)});
    const a={nom,f,hCJ,totalJours:expected.length,joursPresent:0,hTheo:0,hReel:0,oublis:[],journees:[]};

    expected.forEach(dk=>{
      const sc=days[dk]||[];const arrs=sc.filter(s=>s.sens==='A').map(s=>s.tm);const deps=sc.filter(s=>s.sens==='D').map(s=>s.tm);
      const hT=hCJ;a.hTheo+=hT;
      const j={date:dk,arrs,deps,hT,hR:null,delta:0,issues:[]};

      if(sc.length===0){
        j.hR=hT;j.issues.push({type:'no_scan',label:'Aucun scan — contrat appliqué'});
        a.oublis.push({date:dk,type:'total'});a.hReel+=hT;a.joursPresent++;
      } else {
        a.joursPresent++;
        let sA=null,sD=null;
        if(!arrs.length&&deps.length){j.issues.push({type:'no_arr',label:'Arr. non scannée'});a.oublis.push({date:dk,type:'arrivee'});sA=f.arr;}
        else if(arrs.length) sA=Math.min(...arrs);
        if(!deps.length&&arrs.length){j.issues.push({type:'no_dep',label:'Dép. non scanné'});a.oublis.push({date:dk,type:'depart'});sD=f.dep;}
        else if(deps.length) sD=Math.max(...deps);

        if(sA!==null&&sD!==null){
          const hR=Math.max(0,(sD-sA)/60);j.hR=Math.round(hR*100)/100;a.hReel+=j.hR;
          j.delta=Math.round((j.hR-hT)*100)/100;
          if(j.delta<-0.08) j.issues.push({type:'sous',label:`${Math.round(j.delta*60)}min`});
          else if(j.delta>0.08) j.issues.push({type:'sur',label:`+${Math.round(j.delta*60)}min`});
          if(arrs.length&&sA>f.arr+tol) j.issues.push({type:'arr_t',label:`Arr +${sA-f.arr}min`});
          if(arrs.length&&sA<f.arr-tol) j.issues.push({type:'arr_e',label:`Arr ${sA-f.arr}min`});
          if(deps.length&&sD<f.dep-tol) j.issues.push({type:'dep_e',label:`Dép ${sD-f.dep}min`});
          if(deps.length&&sD>f.dep+tol) j.issues.push({type:'dep_t',label:`Dép +${sD-f.dep}min`});
          if(arrs.length>1) j.issues.push({type:'dup',label:`${arrs.length}×arr`});
          if(deps.length>1) j.issues.push({type:'dup',label:`${deps.length}×dép`});
        } else {j.hR=hT;a.hReel+=hT;}
      }
      a.journees.push(j);
    });

    a.conformite=a.hTheo>0?Math.round(a.hReel/a.hTheo*10000)/100:100;
    a.deltaH=Math.round((a.hReel-a.hTheo)*100)/100;
    a.hPerdues=Math.round(a.journees.filter(j=>j.delta<0).reduce((s,j)=>s+Math.abs(j.delta),0)*100)/100;
    a.nbOublis=a.oublis.length;
    globalHTheo+=a.hTheo;globalHReel+=a.hReel;
    results[nom]=a;
  });

  // Store globals for PSU calculation
  results._global={hFacturees:Math.round(globalHTheo*10)/10, hRealisees:Math.round(globalHReel*10)/10};
  renderEcarts();renderPointage();
}

function exportCSV(){
